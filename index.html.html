<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🦩 火烈鸟手势交互</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none; font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif; }

  /* ====== 舞台 ====== */
  #stage {
    position:fixed; inset:0;
    background: linear-gradient(180deg, #b5446e 0%, #f7688a 45%, #ff9a6c 88%, #ffb585 100%);
    overflow:hidden;
    transition: background 800ms ease;
  }
  /* 夕阳光晕 */
  #stage::before {
    content:""; position:absolute; right:18%; top:30%;
    width:340px; height:340px; border-radius:50%;
    background: radial-gradient(circle, rgba(255,220,170,0.55) 0%, rgba(255,180,140,0.25) 35%, transparent 70%);
    filter: blur(8px);
    pointer-events:none;
    transition: filter 600ms ease;
  }
  /* 远山剪影 */
  #stage::after {
    content:""; position:absolute; left:0; right:0; bottom:18%;
    height:80px;
    background: linear-gradient(180deg, transparent 0%, rgba(80,30,55,0.35) 70%, rgba(60,20,45,0.55) 100%);
    clip-path: polygon(0% 100%, 0% 65%, 8% 50%, 16% 60%, 24% 35%, 35% 55%, 45% 40%, 55% 60%, 68% 30%, 78% 55%, 88% 45%, 100% 60%, 100% 100%);
    pointer-events:none;
  }

  /* ====== Canvas层 ====== */
  canvas.layer {
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none;
  }
  #bgCanvas { z-index:2; }
  #fxCanvas { z-index:6; }

  /* ====== 火烈鸟容器 ====== */
  #flamingo {
    position:absolute;
    z-index:5;
    /* 默认iPhone横屏定位：右侧居中 */
    right: 18%;
    bottom: 14%;
    width: 38vh;
    aspect-ratio: 403 / 500;
    transform-origin: 50% 88%;
    transition: filter 1200ms cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    pointer-events: auto;
  }
  #flamingo.breath { animation: breath 2200ms ease-in-out infinite; }
  @keyframes breath {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.05); }
  }
  #flamingoImg {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:contain;
    transition: filter 800ms ease;
    will-change: transform, filter;
  }
  #flamingoImg.glow {
    filter: var(--flamingo-filter, none) drop-shadow(0 0 18px #f9a8c9);
  }
  /* 倒影（脚下水潭里） */
  #flamingoReflection {
    position:absolute;
    right: 18%;
    bottom: 14%; /* 与 #flamingo 同 */
    width: 38vh;
    aspect-ratio: 403 / 500;
    z-index:3;
    transform-origin: 50% 100%;
    transform: scaleY(-0.32);
    opacity: 0.22;
    filter: blur(2.5px) saturate(0.7);
    pointer-events:none;
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 80%);
            mask-image: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 80%);
  }
  #flamingoReflection img { width:100%; height:100%; object-fit:contain; }

  /* SVG 装饰层（翅膀+尾羽） */
  #overlaySVG {
    position:absolute; inset:0;
    width:100%; height:100%;
    pointer-events:none;
    overflow:visible;
  }

  /* ====== 摄像头预览（调试） ====== */
  #cameraBox {
    position:fixed; right:8px; bottom:8px;
    width:160px; height:90px;
    z-index:50;
    border-radius:8px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.18);
    background:#000;
    opacity:0.65;
    transition: opacity 200ms;
  }
  #cameraBox.hidden { display:none; }
  #video, #cameraCanvas {
    position:absolute; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    transform: scaleX(-1); /* 镜像 */
  }
  #video { z-index:1; }
  #cameraCanvas { z-index:2; pointer-events:none; }

  /* ====== 调试面板 ====== */
  #debug {
    position:fixed; left:8px; top:8px;
    z-index:50;
    width: 240px;
    background: rgba(20,8,16,0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border:1px solid rgba(255,182,210,0.22);
    border-radius:10px;
    padding:10px 12px;
    color: #ffe6ee;
    font-size: 11px;
    font-family: ui-monospace,Menlo,Consolas,monospace;
    line-height:1.4;
    transition: opacity 200ms, transform 200ms;
  }
  #debug.collapsed { transform: translateX(-220px); }
  #debug h3 {
    font-size:12px; margin-bottom:6px;
    color:#ffb6d2; letter-spacing:0.05em;
    display:flex; justify-content:space-between; align-items:center;
  }
  #debug h3 button {
    background:rgba(255,182,210,0.18); color:#ffe6ee;
    border:none; border-radius:4px; padding:2px 6px;
    font-size:10px; cursor:pointer;
  }
  .bar-row { display:flex; align-items:center; gap:6px; margin:3px 0; }
  .bar-row .lbl { width:70px; font-size:10px; color:#ffd6e0; white-space:nowrap; }
  .bar-row .bar {
    flex:1; height:6px; background:rgba(255,255,255,0.10); border-radius:3px; overflow:hidden;
  }
  .bar-row .bar > i {
    display:block; height:100%; width:0%;
    border-radius:3px;
    transition: width 80ms linear;
  }
  .bar-row .val { width:38px; text-align:right; font-size:10px; color:#fff; }
  .bar-neck > i { background: linear-gradient(90deg,#7ec8ff,#3a8dff); }
  .bar-wing > i { background: linear-gradient(90deg,#ffcf6e,#ff8a3d); }
  .bar-color > i { background: linear-gradient(90deg,#ffb6d2,#ff3d7a); }
  .bar-swipe { color:#ffd6e0; }

  .slider-row { display:flex; align-items:center; gap:6px; margin:4px 0; }
  .slider-row .lbl { width:70px; font-size:10px; color:#ffd6e0; white-space:nowrap; }
  .slider-row input[type=range] {
    flex:1; -webkit-appearance:none; appearance:none;
    height:4px; background: rgba(255,255,255,0.16); border-radius:2px; outline:none;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width:12px; height:12px; border-radius:50%;
    background:#ffb6d2; border:1px solid rgba(255,255,255,0.4);
    cursor:pointer;
  }
  .slider-row .val { width:38px; text-align:right; font-size:10px; color:#fff; }

  .btn-row { display:flex; gap:5px; margin-top:6px; }
  .btn-row button {
    flex:1; padding:5px 6px; font-size:10px;
    background: linear-gradient(180deg, rgba(255,182,210,0.28), rgba(255,182,210,0.10));
    color:#ffe6ee; border:1px solid rgba(255,182,210,0.32);
    border-radius:5px; cursor:pointer;
    font-family:inherit;
  }
  .btn-row button:active { transform: scale(0.95); }

  .status-row { display:flex; gap:6px; margin-top:6px; align-items:center; font-size:10px; }
  .status-dot {
    width:8px; height:8px; border-radius:50%;
    background:#444; box-shadow:0 0 6px transparent;
    transition: all 200ms;
  }
  .status-dot.green { background:#4ade80; box-shadow:0 0 8px rgba(74,222,128,0.7); }
  .status-dot.yellow { background:#fbbf24; box-shadow:0 0 8px rgba(251,191,36,0.7); }
  .status-dot.orange { background:#fb923c; box-shadow:0 0 8px rgba(251,146,60,0.7); }
  .status-dot.red { background:#ef4444; box-shadow:0 0 8px rgba(239,68,68,0.7); }

  #toggleDebug {
    position:fixed; left:8px; top:8px;
    z-index:51;
    width:28px; height:28px; border-radius:6px;
    background: rgba(255,182,210,0.22); border:1px solid rgba(255,255,255,0.2);
    color:#fff; font-size:14px; cursor:pointer;
    display:none;
  }
  #debug.collapsed + #toggleDebug { display:block; }

  /* 提示文字 */
  #hint {
    position:fixed; left:50%; bottom:8px;
    transform:translateX(-50%);
    z-index:40;
    color: rgba(255,230,238,0.85);
    font-size:11px;
    background: rgba(20,8,16,0.5);
    padding:6px 12px; border-radius:14px;
    backdrop-filter: blur(6px);
    pointer-events:none;
    text-align:center;
    letter-spacing:0.04em;
    white-space:nowrap;
  }
  #hint.fade-out { animation: hintFade 600ms forwards; }
  @keyframes hintFade { to { opacity:0; transform:translate(-50%,12px); } }

  /* 加载遮罩 */
  #loader {
    position:fixed; inset:0;
    z-index:100;
    background: linear-gradient(180deg,#1a0a12,#3a1525);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:14px;
    color:#ffd6e0; font-size:13px;
    transition: opacity 600ms;
  }
  #loader.hidden { opacity:0; pointer-events:none; }
  #loader .spin {
    width:32px; height:32px; border-radius:50%;
    border:3px solid rgba(255,182,210,0.22);
    border-top-color:#ffb6d2;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  @media (orientation:portrait) {
    #flamingo { right:50%; transform: translateX(50%); width:46vw; bottom:18%; }
    #flamingoReflection { right:50%; transform: translateX(50%) scaleY(-0.32); width:46vw; bottom:18%; }
  }
</style>
</head>

<script>
/* ==================================================================
   🦩 火烈鸟手势交互主脚本
   8个模块依次定义：CONFIG / ASSET / SVG / CANVAS / GESTURE / LOOP / EVENT / DEBUG
   ================================================================== */

'use strict';

/* ===== MODULE 1: CONFIG & CONSTANTS ===== */
const CONFIG = {
  // 颜色阶段：每完成一次挥手 colorStage += 0.333
  colorStages: [
    { sat: 0.0, bri: 1.18, hue:  0 },   // stage 0: 灰白
    { sat: 0.7, bri: 1.10, hue: -3 },   // stage 1: 浅粉
    { sat: 1.4, bri: 1.05, hue: -6 },   // stage 2: 粉红
    { sat: 2.4, bri: 1.02, hue: -10 },  // stage 3: 深珊瑚红
  ],

  // 手势参数
  gesture: {
    smoothAlpha: 0.28,        // 低通滤波系数
    shoulderRatio: 0.40,      // 肩部基准线 = 视频高度 * 0.40
    deadzone: 0.15,           // 中性区半宽
    rangeRatio: 0.30,         // 归一化分母比例
    maxDeltaPerFrame: 0.06,   // ratio单帧最大变化（防抖）
    swipeUpZone: 0.35,        // 进入"上区"阈值（smoothedY > +0.35）
    swipeDownZone: -0.35,     // 进入"下区"阈值
  },

  // 峰值特效
  peak: {
    cooldown: 9000,
    petalCount: 24,
    petalBatches: 3,
    petalBatchInterval: 130,
    pulseDuration: 1800,
    pulseCycles: 4,
  },

  // 场景颜色
  palette: {
    waterInner: '#ffd6e8',
    waterOuter: '#c9a0b8',
    rippleRGBA: (a) => `rgba(255,182,210,${a})`,
    petals: ['#ffc0cb','#ffb6d2','#f9a8c9','#f4839e','#ff8fb1'],
    fish: ['#ff8fa3','#ffd166','#e88baf'],
    shrimp: '#ffb6c1',
    sparkle: 'rgba(255,200,220,',
    feather: ['#ffc0cb','#f4839e','#ffb6d2'],
  },
};

/* 全局状态 */
window.neckRatio = 0;
window.wingRatio = 0;
window.colorStage = 0;          // 离散目标值（每挥手累加）
window.colorStageDisplay = 0;   // 平滑跟随的显示值
window.swipeCount = 0;
window.smoothedY = 0;
window.isPeakTriggered = false;

const STATE = {
  rawY: 0,
  smoothedY: 0,
  prevSmoothedY: 0,
  swipeState: 'neutral',     // neutral | inUp | inDown
  lastZone: 'mid',           // mid | up | down
  detected: false,
  lastDetectionTime: 0,
  manualNeck: 0,             // 滑块覆盖
  manualWing: 0,
  useManualNeck: false,
  useManualWing: false,
  hover: false,
  pressing: false,
  lastTapTime: 0,
  peakActive: false,
  peakStartTime: 0,
  pulseStartTime: 0,
};

/* DOM引用 */
const DOM = {};
function bindDOM() {
  ['stage','bgCanvas','fxCanvas','flamingo','flamingoImg','flamingoReflection','overlaySVG','video','cameraCanvas','cameraBox',
   'debug','toggleDebug','collapseBtn','hint','loader',
   'bar-neck','bar-wing','bar-color','val-neck','val-wing','val-color','val-swipe',
   'slider-neck','slider-wing','val-slider-neck','val-slider-wing',
   'btn-color','btn-reset','btn-peak',
   'dot-detect','dot-neck','dot-wing','dot-peak'
  ].forEach(id => DOM[id] = document.getElementById(id));
}

/* 工具函数 */
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp  = (a, b, t) => a + (b - a) * t;
const smoothstep = (e0, e1, x) => {
  const t = clamp((x - e0) / (e1 - e0), 0, 1);
  return t * t * (3 - 2 * t);
};
const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);
const easeOutBack  = (t, s = 1.70158) => {
  const c = s + 1;
  return 1 + c * Math.pow(t - 1, 3) + s * Math.pow(t - 1, 2);
};
const easeInOutQuad = (t) => t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
const rand = (a, b) => a + Math.random() * (b - a);


/* ===== MODULE 2: ASSET LOADING ===== */
/* 火烈鸟PNG已通过 <img src="data:..."> 内嵌，无需额外加载逻辑。
   此模块负责等待图片就绪 + 隐藏loader。                        */
function waitFlamingoReady() {
  return new Promise(resolve => {
    if (DOM.flamingoImg.complete && DOM.flamingoImg.naturalWidth > 0) return resolve();
    DOM.flamingoImg.onload = () => resolve();
    DOM.flamingoImg.onerror = () => resolve();
  });
}


/* ===== MODULE 3: SVG OVERLAY (翅膀 + 尾羽 装饰层) ===== */
/* 注意：因主体是PNG，SVG装饰层只在火烈鸟翅膀/尾部位置叠加额外笔触，
   用于扇翅/尾羽展开的精细控制（PNG尺寸基准 403x500）         */
const SVG_NS = 'http://www.w3.org/2000/svg';
function setupSVGOverlay() {
  const svg = DOM.overlaySVG;
  svg.innerHTML = '';

  // defs 渐变
  const defs = document.createElementNS(SVG_NS, 'defs');
  defs.innerHTML = `
    <radialGradient id="wingGrad" cx="0.4" cy="0.5" r="0.8">
      <stop offset="0%"  stop-color="#fff0f3" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#f4a7b9" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#e8637a" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="tailGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8637a"/>
      <stop offset="100%" stop-color="#f9ccd8"/>
    </linearGradient>
    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  `;
  svg.appendChild(defs);

  /* --- 翅膀覆盖层（PNG主体已含翅膀，此处仅保留分组节点供未来扩展，默认不渲染） --- */
  const wing = document.createElementNS(SVG_NS, 'g');
  wing.setAttribute('id', 'wingGroup');
  wing.style.display = 'none';
  svg.appendChild(wing);

  /* --- 尾羽组：已弃用（SVG 尾羽坐标与 PNG 实际尾部位置对不齐，hover 会出现错位扇形）
         仅保留空 group 节点防止 querySelector 报错                                  --- */
  const tail = document.createElementNS(SVG_NS, 'g');
  tail.setAttribute('id', 'tailGroup');
  tail.style.display = 'none';
  svg.appendChild(tail);

  // 给主体PNG initial filter
  applyColorFilter(0);
}


/* ===== MODULE 4: CANVAS LAYERS (背景: 水潭+鱼虾+涟漪 / 前景: 花瓣+光斑) ===== */
const CANVAS = {
  bg: null, bgCtx: null,
  fx: null, fxCtx: null,
  cam: null, camCtx: null,
  W: 0, H: 0, dpr: 1,
  ripples: [],
  fishes: [],
  shrimps: [],
  petals: [],
  sparkles: [],
  feathers: [],
  pondCenter: { x: 0, y: 0, rx: 200, ry: 36 },
  flamingoCenter: { x: 0, y: 0 }, // 屏幕坐标
  glowAlpha: 0,
  glowScale: 0,
};

function setupCanvas() {
  const dpr = CANVAS.dpr = Math.min(window.devicePixelRatio || 1, 2);
  const W = CANVAS.W = window.innerWidth;
  const H = CANVAS.H = window.innerHeight;

  for (const [layer, id] of [['bg','bgCanvas'],['fx','fxCanvas'],['cam','cameraCanvas']]) {
    const c = DOM[id];
    c.width = (id === 'cameraCanvas' ? 160 : W) * dpr;
    c.height = (id === 'cameraCanvas' ? 90 : H) * dpr;
    const ctx = c.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    CANVAS[layer] = c;
    CANVAS[layer + 'Ctx'] = ctx;
  }

  // 计算水潭中心和火烈鸟脚底位置
  recomputeAnchors();

  // 初始化小鱼小虾
  initWaterCreatures();
}

function recomputeAnchors() {
  const W = CANVAS.W, H = CANVAS.H;
  const isPortrait = H > W;
  // flamingo元素位置参考CSS
  if (isPortrait) {
    CANVAS.flamingoCenter.x = W * 0.5;
    CANVAS.flamingoCenter.y = H * 0.62;
    CANVAS.pondCenter.x = W * 0.5;
    CANVAS.pondCenter.y = H * 0.86;
    CANVAS.pondCenter.rx = Math.min(180, W * 0.42);
    CANVAS.pondCenter.ry = 32;
  } else {
    CANVAS.flamingoCenter.x = W * 0.78;
    CANVAS.flamingoCenter.y = H * 0.55;
    CANVAS.pondCenter.x = W * 0.78;
    CANVAS.pondCenter.y = H * 0.88;
    CANVAS.pondCenter.rx = Math.min(180, W * 0.20);
    CANVAS.pondCenter.ry = 28;
  }
}

function initWaterCreatures() {
  CANVAS.fishes = [];
  for (let i = 0; i < 3; i++) {
    CANVAS.fishes.push({
      x: CANVAS.pondCenter.x + rand(-CANVAS.pondCenter.rx*0.7, CANVAS.pondCenter.rx*0.7),
      y: CANVAS.pondCenter.y + rand(-CANVAS.pondCenter.ry*0.4, CANVAS.pondCenter.ry*0.4),
      vx: rand(0.3, 0.7) * (Math.random()<0.5?-1:1),
      size: rand(7, 11),
      color: CONFIG.palette.fish[i],
      tailPhase: Math.random() * Math.PI * 2,
    });
  }
  CANVAS.shrimps = [];
  for (let i = 0; i < 2; i++) {
    const x = CANVAS.pondCenter.x + rand(-CANVAS.pondCenter.rx*0.6, CANVAS.pondCenter.rx*0.6);
    const y = CANVAS.pondCenter.y + rand(0, CANVAS.pondCenter.ry*0.3);
    CANVAS.shrimps.push({
      x: x, y: y, baseY: y,
      vy: 0,
      jumpAt: performance.now() + rand(800, 1500),
    });
  }
}

/* --- 水潭与生物绘制 --- */
function drawBackground(t) {
  const ctx = CANVAS.bgCtx;
  const W = CANVAS.W, H = CANVAS.H;
  const p = CANVAS.pondCenter;
  ctx.clearRect(0, 0, W, H);

  // 水潭椭圆（带羽化边缘）
  ctx.save();
  ctx.translate(p.x, p.y);

  // 外圈深色羽化
  const outerGrad = ctx.createRadialGradient(0,0,p.rx*0.4, 0,0, p.rx);
  outerGrad.addColorStop(0, 'rgba(255,214,232,0.55)');
  outerGrad.addColorStop(0.55, 'rgba(201,160,184,0.40)');
  outerGrad.addColorStop(1.0, 'rgba(80,30,55,0.0)');
  ctx.fillStyle = outerGrad;
  // 翅膀风压让水面X方向略压扁
  const sx = lerp(1.0, 0.88, window.wingRatio);
  ctx.beginPath();
  ctx.ellipse(0, 0, p.rx * sx, p.ry, 0, 0, Math.PI * 2);
  ctx.fill();

  // 中心浅光
  ctx.fillStyle = 'rgba(255,235,245,0.18)';
  ctx.beginPath();
  ctx.ellipse(-p.rx*0.15, -p.ry*0.4, p.rx*0.5, p.ry*0.45, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();

  // 涟漪
  for (let i = CANVAS.ripples.length - 1; i >= 0; i--) {
    const r = CANVAS.ripples[i];
    const age = (t - r.born) / r.life;
    if (age >= 1) { CANVAS.ripples.splice(i, 1); continue; }
    const easeAge = easeOutCubic(age);
    const radius = r.r0 + (r.r1 - r.r0) * easeAge;
    const alpha = (1 - age) * r.maxAlpha;
    ctx.save();
    ctx.translate(r.x, r.y);
    ctx.scale(1, 0.32); // 椭圆压扁（水面透视）
    ctx.strokeStyle = CONFIG.palette.rippleRGBA(alpha);
    ctx.lineWidth = lerp(2.5, 0.5, easeAge);
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // 鱼
  CANVAS.fishes.forEach(f => {
    const speedMul = 1 + window.neckRatio * 3.4;
    f.x += f.vx * speedMul;
    f.tailPhase += 0.18 * speedMul;
    // 边界
    const halfRx = p.rx * 0.85;
    const dx = f.x - p.x;
    const dy = f.y - p.y;
    if (Math.abs(dx) > halfRx) { f.vx *= -1; f.x = p.x + Math.sign(dx) * halfRx; }
    // y方向轻微随波
    f.y += Math.sin(t/600 + f.tailPhase) * 0.08;

    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(f.vx > 0 ? 1 : -1, 1);
    ctx.fillStyle = f.color;
    ctx.globalAlpha = 0.78;
    // 身体
    ctx.beginPath();
    ctx.ellipse(0, 0, f.size, f.size * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    // 尾巴
    const wag = Math.sin(f.tailPhase) * 4;
    ctx.beginPath();
    ctx.moveTo(-f.size * 0.9, 0);
    ctx.lineTo(-f.size * 1.6, -f.size * 0.4 + wag);
    ctx.lineTo(-f.size * 1.6, f.size * 0.4 + wag);
    ctx.closePath();
    ctx.globalAlpha = 0.55;
    ctx.fill();
    // 眼睛
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#2a0a12';
    ctx.beginPath();
    ctx.arc(f.size * 0.55, -f.size * 0.1, 1.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // 虾
  CANVAS.shrimps.forEach(s => {
    if (t > s.jumpAt && s.y >= s.baseY - 0.5) {
      s.vy = -2.2;
      s.jumpAt = t + rand(900, 1500);
    }
    s.vy += 0.16;
    s.y += s.vy;
    if (s.y > s.baseY) { s.y = s.baseY; s.vy = 0; }

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.strokeStyle = CONFIG.palette.shrimp;
    ctx.lineWidth = 1.6;
    ctx.globalAlpha = 0.78;
    // 弯弧身
    ctx.beginPath();
    ctx.arc(0, 0, 5, Math.PI * 0.15, Math.PI * 0.85);
    ctx.stroke();
    // 触须
    ctx.lineWidth = 0.8;
    for (let k = -1; k <= 1; k += 2) {
      ctx.beginPath();
      ctx.moveTo(k * 1.5, -2);
      ctx.lineTo(k * 5, -7);
      ctx.stroke();
    }
    ctx.restore();
  });
}

/* --- 前景特效（花瓣/光斑/羽毛/光晕） --- */
function drawForeground(t) {
  const ctx = CANVAS.fxCtx;
  ctx.clearRect(0, 0, CANVAS.W, CANVAS.H);

  // 峰值光晕圆
  if (CANVAS.glowAlpha > 0.01) {
    const fc = CANVAS.flamingoCenter;
    const r = CANVAS.glowScale;
    const g = ctx.createRadialGradient(fc.x, fc.y, 0, fc.x, fc.y, r);
    g.addColorStop(0, `rgba(255,150,190,${CANVAS.glowAlpha})`);
    g.addColorStop(0.55, `rgba(255,182,210,${CANVAS.glowAlpha*0.4})`);
    g.addColorStop(1, 'rgba(255,182,210,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(fc.x, fc.y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 花瓣
  for (let i = CANVAS.petals.length - 1; i >= 0; i--) {
    const p = CANVAS.petals[i];
    const age = (t - p.born) / p.life;
    if (age >= 1) { CANVAS.petals.splice(i, 1); continue; }
    p.vy += 0.12;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    const alpha = (1 - easeInOutQuad(age)) * 0.92;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    // 花瓣形状：变形椭圆
    ctx.beginPath();
    ctx.moveTo(0, -7);
    ctx.bezierCurveTo(7, -7, 7, 7, 0, 7);
    ctx.bezierCurveTo(-7, 7, -7, -7, 0, -7);
    ctx.fill();
    // 中线（很细很淡，仅暗示）
    ctx.strokeStyle = 'rgba(220,140,160,' + alpha*0.18 + ')';
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(0,-5); ctx.lineTo(0,5);
    ctx.stroke();
    ctx.restore();
  }

  // 光斑
  for (let i = CANVAS.sparkles.length - 1; i >= 0; i--) {
    const s = CANVAS.sparkles[i];
    const age = (t - s.born) / s.life;
    if (age >= 1) { CANVAS.sparkles.splice(i, 1); continue; }
    s.x += s.vx;
    s.y += s.vy;
    s.vx *= 0.96; s.vy *= 0.96;
    const alpha = (1 - age) * 0.9;
    ctx.save();
    ctx.translate(s.x, s.y);
    const r = s.r * (1 - age * 0.3);
    const g = ctx.createRadialGradient(0,0,0, 0,0, r);
    g.addColorStop(0, `rgba(255,230,238,${alpha})`);
    g.addColorStop(0.5, `rgba(255,182,210,${alpha*0.8})`);
    g.addColorStop(1, 'rgba(255,182,210,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // 羽毛
  for (let i = CANVAS.feathers.length - 1; i >= 0; i--) {
    const f = CANVAS.feathers[i];
    const age = (t - f.born) / f.life;
    if (age >= 1) { CANVAS.feathers.splice(i, 1); continue; }
    f.vy += 0.05;
    f.x += f.vx + Math.sin(t/300 + f.phase) * 0.6;
    f.y += f.vy;
    f.rot += f.vr;
    const alpha = (1 - easeOutCubic(age)) * 0.85;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.fillStyle = f.color;
    ctx.globalAlpha = alpha;
    // 纺锤羽毛
    ctx.beginPath();
    ctx.moveTo(0, -11);
    ctx.bezierCurveTo(4, -8, 4, 8, 0, 11);
    ctx.bezierCurveTo(-4, 8, -4, -8, 0, -11);
    ctx.fill();
    // 羽轴
    ctx.strokeStyle = 'rgba(160,40,70,' + alpha*0.6 + ')';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(0,10); ctx.stroke();
    ctx.restore();
  }
}

/* --- 涟漪/花瓣/光斑/羽毛 spawn --- */

/* ===== MODULE 5: MEDIAPIPE & GESTURE ===== */
let mpHands = null;
let mpCamera = null;

async function initMediaPipe() {
  if (typeof Hands === 'undefined') {
    console.warn('MediaPipe Hands未加载');
    return;
  }
  mpHands = new Hands({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
  });
  mpHands.setOptions({
    maxNumHands: 1,
    modelComplexity: 0,
    minDetectionConfidence: 0.6,
    minTrackingConfidence: 0.5,
  });
  mpHands.onResults(onHandResults);

  // 启动摄像头
  try {
    mpCamera = new Camera(DOM.video, {
      onFrame: async () => {
        if (mpHands) await mpHands.send({ image: DOM.video });
      },
      width: 640,
      height: 360,
    });
    await mpCamera.start();
  } catch (e) {
    console.warn('摄像头初始化失败:', e);
    DOM.cameraBox.classList.add('hidden');
  }
}

function onHandResults(results) {
  const ctx = CANVAS.camCtx;
  const cw = 160, ch = 90;
  ctx.clearRect(0, 0, cw, ch);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    STATE.detected = true;
    STATE.lastDetectionTime = performance.now();
    const lm = results.multiHandLandmarks[0];

    // 绘制骨架（mini-cam）
    if (typeof drawConnectors !== 'undefined') {
      drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: 'rgba(120,255,180,0.55)', lineWidth: 1 });
      drawLandmarks(ctx, lm, { color: 'rgba(255,200,220,0.85)', lineWidth: 0.5, radius: 1.5 });
    }

    // landmark[9] 中指根
    const palmY = lm[9].y; // 0~1, 0=top
    const shoulderY = CONFIG.gesture.shoulderRatio;
    const delta = shoulderY - palmY;  // 正=手在肩上方
    const range = CONFIG.gesture.rangeRatio;
    STATE.rawY = clamp(delta / range, -1, 1);
  } else {
    if (performance.now() - STATE.lastDetectionTime > 800) {
      STATE.detected = false;
      STATE.rawY *= 0.92;
    }
  }
}

/** 在 animate loop 中调用：基于 STATE.rawY + 滑块 计算最终 ratio */
function updateRatios() {
  // 低通滤波
  STATE.smoothedY = STATE.smoothedY * (1 - CONFIG.gesture.smoothAlpha) + STATE.rawY * CONFIG.gesture.smoothAlpha;
  window.smoothedY = STATE.smoothedY;

  // 上下挥手计数（仅在真正有手势识别时）
  if (STATE.detected) detectSwipe(STATE.smoothedY);

  // 计算两个 ratio
  const dz = CONFIG.gesture.deadzone;
  let targetNeck = STATE.smoothedY < -dz ? clamp((-STATE.smoothedY - dz) / (1 - dz), 0, 1) : 0;
  let targetWing = STATE.smoothedY >  dz ? clamp(( STATE.smoothedY - dz) / (1 - dz), 0, 1) : 0;

  // 滑块覆盖
  if (STATE.useManualNeck) targetNeck = STATE.manualNeck;
  if (STATE.useManualWing) targetWing = STATE.manualWing;

  // 帧间限速
  const maxD = CONFIG.gesture.maxDeltaPerFrame;
  window.neckRatio += clamp(targetNeck - window.neckRatio, -maxD, maxD);
  window.wingRatio += clamp(targetWing - window.wingRatio, -maxD, maxD);
}

function detectSwipe(y) {
  const upZ = CONFIG.gesture.swipeUpZone;
  const dnZ = CONFIG.gesture.swipeDownZone;
  let zone = 'mid';
  if (y > upZ) zone = 'up';
  else if (y < dnZ) zone = 'down';

  if (zone !== STATE.lastZone && zone !== 'mid') {
    if ((STATE.lastZone === 'up' && zone === 'down') ||
        (STATE.lastZone === 'down' && zone === 'up')) {
      // 完成一次方向反转
      window.swipeCount += 1;
      onSwipeCompleted();
    }
    STATE.lastZone = zone;
  } else if (zone === 'mid' && STATE.lastZone !== 'mid') {
    // 经过中区不重置 lastZone（要看下一次进入的方向）
  }
}

function onSwipeCompleted() {
  // 颜色阶段累加
  if (window.colorStage < 1.0) {
    window.colorStage = Math.min(1.0, window.colorStage + 0.334);
    // 在UI/状态上响应
    triggerColorPulse();
  }
  if (window.colorStage >= 0.99 && !STATE.peakActive) {
    triggerPeak();
  }
}

function triggerColorPulse() {
  // PNG主体一次小幅度颤动
  DOM.flamingoImg.animate(
    [{ transform: 'scale(1)' }, { transform: 'scale(1.05)' }, { transform: 'scale(1)' }],
    { duration: 420, easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)' }
  );
}

function applyColorFilter(stageContinuous) {
  // 在4档之间线性插值
  const s = clamp(stageContinuous, 0, 1) * 3; // 0~3
  const i0 = Math.floor(s);
  const i1 = Math.min(3, i0 + 1);
  const f = s - i0;
  const a = CONFIG.colorStages[i0];
  const b = CONFIG.colorStages[i1];
  const sat = lerp(a.sat, b.sat, f);
  const bri = lerp(a.bri, b.bri, f);
  const hue = lerp(a.hue, b.hue, f);
  const filterStr = `saturate(${sat.toFixed(3)}) brightness(${bri.toFixed(3)}) hue-rotate(${hue.toFixed(2)}deg)`;
  DOM.flamingoImg.style.setProperty('--flamingo-filter', filterStr);
  if (!DOM.flamingoImg.classList.contains('glow')) {
    DOM.flamingoImg.style.filter = filterStr;
  }
  // 倒影同步
  DOM.flamingoReflection.querySelector('img').style.filter = filterStr + ' blur(0.5px)';
}


/* ===== MODULE 6: ANIMATION LOOP ===== */
function animate(t) {
  // 0) 更新 ratio（合并手势识别 + 滑块）
  updateRatios();

  // 1) 根据 ratio 计算PNG主体transform
  const neck = window.neckRatio;
  const wing = window.wingRatio;

  // 主体：低头戏水时身体微前倾+下沉；展翅时上浮+稍后仰 + 拍打振动
  const tyNeck = neck * 8;
  const tyWing = -wing * 28;
  const ty = tyNeck + tyWing;
  const rotZ = neck * 10 - wing * 5;  // 低头偏转 / 展翅微仰
  // 拍翅振动：高频 sine 模拟扇动节奏
  const flapAmp = 0.04 * wing;
  const flapPhase = t / 90; // ~11Hz，接近真实火烈鸟拍翅频率
  const flapX = 1 + Math.sin(flapPhase) * flapAmp;
  const flapY = 1 - Math.abs(Math.sin(flapPhase)) * flapAmp * 0.6; // 拍下时轻微压缩
  const sc = 1 + wing * 0.04;

  const flamingoTrans = `translateY(${ty.toFixed(2)}px) rotate(${rotZ.toFixed(2)}deg) scale(${(sc * flapX).toFixed(3)}, ${(sc * flapY).toFixed(3)})`;

  // 拍翅产生风羽
  if (wing > 0.5 && Math.sin(flapPhase) > 0.85 && t - (STATE.lastFlapT || 0) > 180) {
    STATE.lastFlapT = t;
    spawnWindFeathers(2);
  }

  // 呼吸动画时不覆盖（hover状态）
  if (!STATE.hover) {
    DOM.flamingo.style.transform = flamingoTrans;
  }

  // 颜色随 colorStage 实时插值（用于平滑过渡）
  // colorStageDisplay 平滑跟随 colorStage（指数缓动）
  window.colorStageDisplay += (window.colorStage - window.colorStageDisplay) * 0.05;
  applyColorFilter(window.colorStageDisplay);

  // 2) SVG翅膀已由PNG主体表达，无需独立旋转

  // 3) 涟漪生成
  maybeSpawnRipple(t);

  // 4) 峰值脉冲控制
  if (STATE.peakActive) {
    const pulseT = t - STATE.pulseStartTime;
    const period = CONFIG.peak.pulseDuration;
    const cycle = pulseT / period;
    if (cycle >= CONFIG.peak.pulseCycles) {
      // 结束峰值
      STATE.peakActive = false;
      DOM.flamingoImg.classList.remove('glow');
      CANVAS.glowAlpha = 0;
      CANVAS.glowScale = 0;
    } else {
      const phase = (cycle % 1);
      const pulseV = Math.sin(phase * Math.PI); // 0->1->0
      // 光晕
      CANVAS.glowAlpha = 0.30 * pulseV;
      CANVAS.glowScale = 30 + 130 * pulseV;
      // brightness pulse on PNG（额外叠加）
      const extraBri = 1 + 0.35 * pulseV;
      const f0 = DOM.flamingoImg.style.getPropertyValue('--flamingo-filter') || '';
      DOM.flamingoImg.style.filter = `${f0} brightness(${extraBri.toFixed(2)}) drop-shadow(0 0 ${(8 + 18*pulseV).toFixed(0)}px #f9a8c9)`;
    }
  }

  // 5) Canvas 绘制
  drawBackground(t);
  drawForeground(t);

  // 6) 调试UI
  updateDebugUI();

  requestAnimationFrame(animate);
}

function triggerPeak() {
  STATE.peakActive = true;
  STATE.peakStartTime = performance.now();
  STATE.pulseStartTime = performance.now() + 300; // 花瓣先飞，再脉冲
  DOM.flamingoImg.classList.add('glow');
  // 花瓣分批
  for (let b = 0; b < CONFIG.peak.petalBatches; b++) {
    setTimeout(() => spawnPetalBurst(Math.floor(CONFIG.peak.petalCount / CONFIG.peak.petalBatches)),
               b * CONFIG.peak.petalBatchInterval);
  }
}


/* ===== MODULE 7: EVENT HANDLERS ===== */
function setupEvents() {
  // 点击/触摸：触发综合特效
  const onTap = (e) => {
    const now = performance.now();
    if (now - STATE.lastTapTime < 200) return;
    STATE.lastTapTime = now;

    let x, y;
    if (e.touches && e.touches[0]) { x = e.touches[0].clientX; y = e.touches[0].clientY; }
    else { x = e.clientX; y = e.clientY; }

    // 1) 羽毛飘落
    spawnFeathers(6);
    // 2) 水波涟漪 ×2
    spawnRipple(CANVAS.pondCenter.x, CANVAS.pondCenter.y, 8, 120, 900, 0.85);
    setTimeout(() => spawnRipple(CANVAS.pondCenter.x, CANVAS.pondCenter.y, 8, 100, 900, 0.7), 120);
    // 3) 眨眼+歪头
    blinkAndTilt();
    // 4) 光斑闪烁
    spawnSparkles(x, y, 12);

    // 隐藏提示
    if (DOM.hint && !DOM.hint.classList.contains('fade-out')) {
      DOM.hint.classList.add('fade-out');
    }
  };
  DOM.stage.addEventListener('click', onTap);
  DOM.stage.addEventListener('touchstart', onTap, { passive: true });

  // hover/长按 → 呼吸+尾羽
  let hoverEnterT = 0;
  const onEnter = () => {
    hoverEnterT = performance.now();
    setTimeout(() => {
      if (performance.now() - hoverEnterT >= 200 && (STATE.hover || STATE.pressing)) {
        activateBreathState();
      }
    }, 220);
  };
  const onLeave = () => {
    deactivateBreathState();
  };
  DOM.flamingo.addEventListener('mouseenter', () => { STATE.hover = true; onEnter(); });
  DOM.flamingo.addEventListener('mouseleave', () => { STATE.hover = false; onLeave(); });
  DOM.flamingo.addEventListener('touchstart', (e) => { STATE.pressing = true; onEnter(); }, { passive: true });
  DOM.flamingo.addEventListener('touchend',   () => { STATE.pressing = false; onLeave(); });
  DOM.flamingo.addEventListener('touchcancel', () => { STATE.pressing = false; onLeave(); });

  // 窗口改变
  window.addEventListener('resize', () => {
    setupCanvas();
  });
  window.addEventListener('orientationchange', () => {
    setTimeout(setupCanvas, 200);
  });
}

function activateBreathState() {
  DOM.flamingo.classList.add('breath');
  DOM.flamingoImg.classList.add('glow');
}
function deactivateBreathState() {
  DOM.flamingo.classList.remove('breath');
  DOM.flamingo.style.transform = ''; // 让动画循环重新接管
  if (!STATE.peakActive) DOM.flamingoImg.classList.remove('glow');
}

function blinkAndTilt() {
  // 头部微动：整体PNG加一次旋转脉冲（无独立头部svg）
  DOM.flamingoImg.animate(
    [
      { transform: 'rotate(0deg)' },
      { transform: 'rotate(-3deg)' },
      { transform: 'rotate(2deg)' },
      { transform: 'rotate(0deg)' },
    ],
    { duration: 380, easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)' }
  );
}


/* ===== MODULE 8: DEBUG UI ===== */
function setupDebug() {
  // 进度条更新由 updateDebugUI 调用

  // 折叠
  DOM.collapseBtn.addEventListener('click', () => {
    DOM.debug.classList.add('collapsed');
  });
  DOM.toggleDebug.addEventListener('click', () => {
    DOM.debug.classList.remove('collapsed');
  });

  // 滑块
  DOM['slider-neck'].addEventListener('input', (e) => {
    STATE.manualNeck = parseFloat(e.target.value);
    STATE.useManualNeck = STATE.manualNeck > 0.001;
    DOM['val-slider-neck'].textContent = STATE.manualNeck.toFixed(2);
  });
  DOM['slider-wing'].addEventListener('input', (e) => {
    STATE.manualWing = parseFloat(e.target.value);
    STATE.useManualWing = STATE.manualWing > 0.001;
    DOM['val-slider-wing'].textContent = STATE.manualWing.toFixed(2);
  });

  // 按钮
  DOM['btn-color'].addEventListener('click', () => {
    window.colorStage = clamp(window.colorStage + 0.334, 0, 1);
    triggerColorPulse();
    if (window.colorStage >= 0.99 && !STATE.peakActive) triggerPeak();
  });
  DOM['btn-reset'].addEventListener('click', () => {
    window.colorStage = 0;
    window.colorStageDisplay = 0;
    window.swipeCount = 0;
    STATE.peakActive = false;
    CANVAS.glowAlpha = 0;
    DOM.flamingoImg.classList.remove('glow');
    DOM['slider-neck'].value = 0;
    DOM['slider-wing'].value = 0;
    STATE.useManualNeck = false;
    STATE.useManualWing = false;
    STATE.manualNeck = 0; STATE.manualWing = 0;
    DOM['val-slider-neck'].textContent = '0.00';
    DOM['val-slider-wing'].textContent = '0.00';
  });
  DOM['btn-peak'].addEventListener('click', () => {
    triggerPeak();
  });
}

function updateDebugUI() {
  DOM['bar-neck'].style.width = (window.neckRatio * 100).toFixed(0) + '%';
  DOM['bar-wing'].style.width = (window.wingRatio * 100).toFixed(0) + '%';
  DOM['bar-color'].style.width = (window.colorStage * 100).toFixed(0) + '%';
  DOM['val-neck'].textContent = window.neckRatio.toFixed(2);
  DOM['val-wing'].textContent = window.wingRatio.toFixed(2);
  DOM['val-color'].textContent = window.colorStage.toFixed(2);
  DOM['val-swipe'].textContent = window.swipeCount;

  // 状态灯
  setDot('dot-detect', STATE.detected ? 'green' : '');
  setDot('dot-neck',   window.neckRatio > 0.05 ? 'yellow' : '');
  setDot('dot-wing',   window.wingRatio > 0.05 ? 'orange' : '');
  setDot('dot-peak',   STATE.peakActive ? 'red' : '');
}
function setDot(id, color) {
  const d = DOM[id];
  d.classList.remove('green','yellow','orange','red');
  if (color) d.classList.add(color);
}


/* ===== INIT ===== */
async function init() {
  bindDOM();
  setupCanvas();
  setupSVGOverlay();
  setupDebug();
  setupEvents();

  await waitFlamingoReady();
  applyColorFilter(0);

  // 启动动画循环
  requestAnimationFrame(animate);

  // 初始化MediaPipe（异步、可能失败）
  initMediaPipe().catch(err => console.warn('MediaPipe init failed:', err));

  // 隐藏loader
  setTimeout(() => DOM.loader.classList.add('hidden'), 350);
}

window.addEventListener('DOMContentLoaded', init);

</script>
